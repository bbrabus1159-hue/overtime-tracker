<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>残業管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent: #e85d75;
    --accent2: #f0a070;
    --text: #e8e8f0;
    --text-muted: #7070a0;
    --today: #2a2a3e;
    --has-data: #1e2e3e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 40px;
  }

  /* Header */
  .header {
    padding: 24px 20px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .app-title {
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
  }

  .month-nav {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .nav-btn {
    width: 36px;
    height: 36px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-btn:active { background: var(--border); transform: scale(0.95); }

  .month-label {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.04em;
    min-width: 120px;
    text-align: center;
  }

  /* Summary bar */
  .summary {
    display: flex;
    gap: 12px;
    padding: 0 20px;
    margin-top: 12px;
  }

  .summary-card {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
  }

  .summary-label {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .summary-value {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--accent2);
  }

  .summary-unit {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: 3px;
  }

  .summary-days {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* Calendar */
  .calendar-wrap {
    padding: 20px 16px 0;
  }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 6px;
  }

  .weekday {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    padding: 4px 0;
    font-weight: 500;
    letter-spacing: 0.05em;
  }
  .weekday:first-child { color: #e85d75aa; }
  .weekday:last-child { color: #5d9de8aa; }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .day-cell {
    aspect-ratio: 1;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    border: 1px solid transparent;
    position: relative;
    padding: 4px 2px;
  }

  .day-cell:active { transform: scale(0.92); }

  .day-cell.empty { cursor: default; }

  .day-cell.today {
    background: var(--today);
    border-color: var(--border);
  }

  .day-cell.has-data {
    background: var(--has-data);
    border-color: #5d9de840;
  }

  .day-cell.today.has-data {
    border-color: var(--accent);
  }

  .day-num {
    font-size: 13px;
    font-weight: 500;
    line-height: 1;
  }

  .day-cell:first-child .day-num,
  .day-cell.sun .day-num { color: #e85d75cc; }
  .day-cell.sat .day-num { color: #5d9de8cc; }

  .day-cell.today .day-num {
    color: var(--accent);
    font-weight: 700;
  }

  .day-overtime {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--accent2);
    margin-top: 3px;
    line-height: 1;
  }

  .today-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent);
    position: absolute;
    bottom: 5px;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    width: 100%;
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    border-top: 1px solid var(--border);
    padding: 24px 24px 48px;
    transform: translateY(100%);
    transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1);
  }

  .modal-overlay.open .modal {
    transform: translateY(0);
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-date {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }

  .modal-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 24px;
  }

  .input-row {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    align-items: flex-end;
  }

  .input-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .input-label {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .time-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    text-align: center;
    padding: 14px 8px;
    width: 100%;
    outline: none;
    -webkit-appearance: none;
    transition: border-color 0.15s;
  }

  .time-input:focus {
    border-color: var(--accent2);
  }

  .input-unit {
    font-size: 14px;
    color: var(--text-muted);
    padding-bottom: 18px;
    font-weight: 500;
  }

  .memo-label {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .memo-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
    resize: none;
    height: 72px;
    margin-bottom: 24px;
    transition: border-color 0.15s;
  }

  .memo-input:focus { border-color: var(--border); }

  .btn-row {
    display: flex;
    gap: 10px;
  }

  .btn-cancel {
    flex: 1;
    padding: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text-muted);
    font-size: 15px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }

  .btn-save {
    flex: 2;
    padding: 14px;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }

  .btn-delete {
    padding: 14px 16px;
    background: transparent;
    border: 1px solid #e85d7540;
    border-radius: 12px;
    color: var(--accent);
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-save:active { transform: scale(0.97); }
  .btn-cancel:active { transform: scale(0.97); }

  /* Preset buttons */
  .presets {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .preset-btn {
    padding: 8px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }

  .preset-btn:active {
    background: var(--accent2);
    color: #000;
    border-color: var(--accent2);
  }

  /* History list */
  .history {
    padding: 20px 16px 0;
  }

  .history-title {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 12px;
    padding: 0 4px;
  }

  .history-item {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 6px;
  }

  .history-date {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
    width: 64px;
    flex-shrink: 0;
  }

  .history-time {
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    color: var(--accent2);
    flex: 1;
  }

  .history-memo {
    font-size: 12px;
    color: var(--text-muted);
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="app-title">残業記録</span>
  </div>
  <div class="month-nav">
    <button class="nav-btn" id="prevBtn">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" id="nextBtn">›</button>
  </div>
  <div class="summary">
    <div class="summary-card">
      <div class="summary-label">月間合計</div>
      <div class="summary-value" id="totalHours">0<span class="summary-unit">h</span> 0<span class="summary-unit">m</span></div>
      <div class="summary-days" id="totalDays">0日</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">平均 / 日</div>
      <div class="summary-value" id="avgTime">—</div>
    </div>
  </div>
</div>

<div class="calendar-wrap">
  <div class="weekdays">
    <div class="weekday">日</div>
    <div class="weekday">月</div>
    <div class="weekday">火</div>
    <div class="weekday">水</div>
    <div class="weekday">木</div>
    <div class="weekday">金</div>
    <div class="weekday">土</div>
  </div>
  <div class="calendar-grid" id="calendarGrid"></div>
</div>

<div class="history" id="historySection">
  <div class="history-title">今月の記録</div>
  <div id="historyList"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-date" id="modalDate"></div>
    <div class="modal-title">残業時間を入力</div>

    <div class="input-row">
      <div class="input-group">
        <div class="input-label">時間</div>
        <input type="number" class="time-input" id="inputHours" min="0" max="23" placeholder="0">
      </div>
      <div class="input-unit">:</div>
      <div class="input-group">
        <div class="input-label">分</div>
        <input type="number" class="time-input" id="inputMins" min="0" max="59" placeholder="00">
      </div>
    </div>

    <div class="presets">
      <button class="preset-btn" onclick="setPreset(0,15)">0:15</button>
      <button class="preset-btn" onclick="setPreset(0,30)">0:30</button>
      <button class="preset-btn" onclick="setPreset(0,45)">0:45</button>
      <button class="preset-btn" onclick="setPreset(1,0)">1:00</button>
      <button class="preset-btn" onclick="setPreset(1,15)">1:15</button>
      <button class="preset-btn" onclick="setPreset(1,30)">1:30</button>
      <button class="preset-btn" onclick="setPreset(1,45)">1:45</button>
      <button class="preset-btn" onclick="setPreset(2,0)">2:00</button>
      <button class="preset-btn" onclick="setPreset(2,15)">2:15</button>
      <button class="preset-btn" onclick="setPreset(2,30)">2:30</button>
      <button class="preset-btn" onclick="setPreset(2,45)">2:45</button>
      <button class="preset-btn" onclick="setPreset(3,0)">3:00</button>
    </div>

    <div class="memo-label">メモ（任意）</div>
    <textarea class="memo-input" id="inputMemo" placeholder="理由など…"></textarea>

    <div class="btn-row">
      <button class="btn-cancel" id="btnCancel">キャンセル</button>
      <button class="btn-delete" id="btnDelete" style="display:none">削除</button>
      <button class="btn-save" id="btnSave">保存</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'overtime_v1';
  let data = {};
  let currentYear, currentMonth;
  let selectedDateKey = null;

  // Init
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth(); // 0-indexed

  // Load
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) data = JSON.parse(saved);
  } catch(e) {}

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function dateKey(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  function formatTime(h, m) {
    if (h === 0 && m === 0) return '—';
    if (h === 0) return `${m}m`;
    if (m === 0) return `${h}h`;
    return `${h}h${String(m).padStart(2,'0')}`;
  }

  function render() {
    // Month label
    document.getElementById('monthLabel').textContent =
      `${currentYear}.${String(currentMonth+1).padStart(2,'0')}`;

    // Summary
    let totalMins = 0, days = 0;
    const prefix = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-`;
    for (const [k, v] of Object.entries(data)) {
      if (k.startsWith(prefix)) {
        totalMins += (v.h||0)*60 + (v.m||0);
        if (v.h > 0 || v.m > 0) days++;
      }
    }
    const th = Math.floor(totalMins/60), tm = totalMins%60;
    document.getElementById('totalHours').innerHTML =
      `${th}<span class="summary-unit">h</span> ${tm}<span class="summary-unit">m</span>`;
    document.getElementById('totalDays').textContent = `${days}日`;
    if (days > 0) {
      const avg = Math.round(totalMins/days);
      const ah = Math.floor(avg/60), am = avg%60;
      document.getElementById('avgTime').innerHTML =
        `${ah}<span class="summary-unit">h</span>${String(am).padStart(2,'0')}<span class="summary-unit">m</span>`;
    } else {
      document.getElementById('avgTime').textContent = '—';
    }

    // Calendar
    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';
    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
    const todayStr = dateKey(now.getFullYear(), now.getMonth(), now.getDate());

    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement('div');
      empty.className = 'day-cell empty';
      grid.appendChild(empty);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      const dow = (firstDay + d - 1) % 7;
      const key = dateKey(currentYear, currentMonth, d);
      const entry = data[key];
      const isToday = key === todayStr;

      cell.className = 'day-cell';
      if (dow === 0) cell.classList.add('sun');
      if (dow === 6) cell.classList.add('sat');
      if (isToday) cell.classList.add('today');
      if (entry && (entry.h > 0 || entry.m > 0)) cell.classList.add('has-data');

      const numEl = document.createElement('div');
      numEl.className = 'day-num';
      numEl.textContent = d;
      cell.appendChild(numEl);

      if (entry && (entry.h > 0 || entry.m > 0)) {
        const ot = document.createElement('div');
        ot.className = 'day-overtime';
        ot.textContent = formatTime(entry.h, entry.m);
        cell.appendChild(ot);
      }

      if (isToday) {
        const dot = document.createElement('div');
        dot.className = 'today-dot';
        cell.appendChild(dot);
      }

      cell.addEventListener('click', () => openModal(currentYear, currentMonth, d));
      grid.appendChild(cell);
    }

    // History list
    const list = document.getElementById('historyList');
    list.innerHTML = '';
    const entries = [];
    for (const [k, v] of Object.entries(data)) {
      if (k.startsWith(prefix) && (v.h > 0 || v.m > 0)) {
        entries.push({key: k, ...v});
      }
    }
    entries.sort((a,b) => b.key.localeCompare(a.key));

    if (entries.length === 0) {
      list.innerHTML = `<div style="color:var(--text-muted);font-size:13px;padding:12px 4px;">まだ記録がありません</div>`;
    }

    entries.forEach(e => {
      const item = document.createElement('div');
      item.className = 'history-item';
      const d = e.key.slice(5); // MM-DD
      item.innerHTML = `
        <div class="history-date">${d}</div>
        <div class="history-time">${formatTime(e.h, e.m)}</div>
        ${e.memo ? `<div class="history-memo">${e.memo}</div>` : ''}
      `;
      item.addEventListener('click', () => {
        const [y, m, day] = e.key.split('-').map(Number);
        openModal(y, m-1, day);
      });
      list.appendChild(item);
    });
  }

  function openModal(y, m, d) {
    selectedDateKey = dateKey(y, m, d);
    const entry = data[selectedDateKey];

    const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    document.getElementById('modalDate').textContent = `${y}年 ${months[m]} ${d}日`;
    document.getElementById('inputHours').value = entry ? entry.h : '';
    document.getElementById('inputMins').value = entry ? (entry.m > 0 ? String(entry.m).padStart(2,'0') : '') : '';
    document.getElementById('inputMemo').value = entry ? (entry.memo || '') : '';
    document.getElementById('btnDelete').style.display = entry ? 'block' : 'none';

    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('inputHours').focus(), 300);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    selectedDateKey = null;
  }

  function setPreset(h, m) {
    document.getElementById('inputHours').value = h;
    document.getElementById('inputMins').value = String(m).padStart(2,'0');
  }

  document.getElementById('btnSave').addEventListener('click', () => {
    const h = parseInt(document.getElementById('inputHours').value) || 0;
    const m = parseInt(document.getElementById('inputMins').value) || 0;
    const memo = document.getElementById('inputMemo').value.trim();
    data[selectedDateKey] = { h, m, memo };
    save();
    closeModal();
    render();
  });

  document.getElementById('btnDelete').addEventListener('click', () => {
    delete data[selectedDateKey];
    save();
    closeModal();
    render();
  });

  document.getElementById('btnCancel').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });

  document.getElementById('prevBtn').addEventListener('click', () => {
    currentMonth--;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    render();
  });

  document.getElementById('nextBtn').addEventListener('click', () => {
    currentMonth++;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    render();
  });

  render();
</script>
</body>
</html>
